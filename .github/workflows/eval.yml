name: Agent Evaluation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install agents-cli
        run: uv tool install google-agents-cli

      - name: Install project dependencies
        run: agents-cli install

      - name: Create dummy ADC for Vertex AI initialization
        run: |
          echo '{"client_id": "dummy.apps.googleusercontent.com", "client_secret": "dummy", "refresh_token": "dummy", "type": "authorized_user"}' > dummy_adc.json
      
      - name: Run evaluation (Generate traces)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: dummy_adc.json
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_PROJECT: dummy
          BLAND_API_KEY: dummy
          GOOGLE_MAPS_API_KEY: dummy
        run: agents-cli eval generate

      - name: Run evaluation (Grade traces)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: dummy_adc.json
          # Required for LLM-as-a-judge grading
        run: agents-cli eval grade
