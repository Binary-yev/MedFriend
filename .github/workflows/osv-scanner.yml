name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  osv-scanner:
    name: OSV-Scanner (Lockfile Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install OSV-Scanner
        run: go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      # Export the *locked* dependency set, not a fresh resolve. `uv pip compile
      # pyproject.toml` ignored uv.lock and re-resolved against live PyPI on every
      # run, which meant the scan could drift from the versions `uv sync --frozen`
      # actually installs in the container -- and left the gate hostage to upstream
      # index churn (a yank of opentelemetry-resourcedetector-gcp 1.13.0 made the
      # resolve unsatisfiable and failed this job with no repo change). `--frozen`
      # reads uv.lock and errors if it is stale, so what we scan is what we ship.
      # Hashes are omitted because OSV matches on name==version; the plain list
      # also avoids the multi-line `\` continuations in the requirements parser.
      - name: Export requirements.txt from uv.lock
        run: |
          pip install uv
          uv export --frozen --no-emit-project --no-dev \
            --no-hashes --format requirements-txt -o requirements.txt
      - name: Run OSV-Scanner
        run: ~/go/bin/osv-scanner -L requirements.txt:requirements.txt
