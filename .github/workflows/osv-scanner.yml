name: OSV-Scanner

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  osv-scanner:
    name: OSV-Scanner (Lockfile Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install OSV-Scanner
        run: go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      - name: Run OSV-Scanner on uv.lock
        run: ~/go/bin/osv-scanner -L uv.lock:uv.lock
