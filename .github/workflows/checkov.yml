name: Checkov Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: Checkov (IaC Scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # `soft_fail: true` is deliberate: IaC findings are advisory here and must not
      # block a push. That makes the reporting path the only thing carrying signal,
      # so emit SARIF as well as the CLI table -- with `output_format: cli` alone the
      # findings only ever reached the log of a job that always finishes green, which
      # meant nothing surfaced anywhere durable. The SARIF upload turns them into
      # Security-tab alerts, matching how bandit.yml reports.
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: deployment/terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: checkov
