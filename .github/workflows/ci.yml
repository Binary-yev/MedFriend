name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Create dummy ADC for Vertex AI initialization
        run: |
          echo '{"client_id": "dummy.apps.googleusercontent.com", "client_secret": "dummy", "refresh_token": "dummy", "type": "authorized_user"}' > dummy_adc.json

      - name: Run unit and integration tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: dummy_adc.json
          GOOGLE_CLOUD_PROJECT: dummy
          BLAND_API_KEY: dummy
          GOOGLE_MAPS_API_KEY: dummy
        run: uv run pytest tests/unit tests/integration
