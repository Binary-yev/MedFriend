<rect x="354" y="446" width="73" height="34" rx="17" ry="17" fill="none" stroke="#2C5661" stroke-width="1.4"/><circle cx="369" cy="463.0" r="4" fill="#39BAA6"/><text x="392.5" y="468" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="15" font-weight="normal" fill="#EAF3F2" text-anchor="middle">A2A</text>
