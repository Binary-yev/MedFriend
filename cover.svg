<text x="104" y="108" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="62" font-weight="bold" fill="#EAF3F2" text-anchor="start" letter-spacing="-1">MedFriend</text>
<text x="106" y="150" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="24" font-weight="bold" fill="#39BAA6" text-anchor="start">A privacy-first care-navigation agent</text>
<text x="66" y="200" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" font-weight="normal" fill="#9CBBBD" text-anchor="start">It reads your insurance denials, drafts evidence-based appeals,</text>
<text x="66" y="230" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" font-weight="normal" fill="#9CBBBD" text-anchor="start">schedules care, and checks your email — treating every document</text>
<text x="66" y="260" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="20" font-weight="normal" fill="#9CBBBD" text-anchor="start">as untrusted, and gating every real action behind your approval.</text>
<text x="66" y="298" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="14" font-weight="bold" fill="#9CBBBD" text-anchor="start" letter-spacing="1.5">WHAT IT DOES</text>
<circle cx="72" cy="325" r="5" fill="#39BAA6"/>
<text x="88" y="330" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Reads &amp; appeals insurance denials</text>
<circle cx="411" cy="325" r="5" fill="#39BAA6"/>
<text x="427" y="330" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Saves relevant documents</text>
<circle cx="72" cy="361" r="5" fill="#39BAA6"/>
<text x="88" y="366" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Schedules appointments &amp; rehab</text>
<circle cx="411" cy="361" r="5" fill="#39BAA6"/>
<text x="427" y="366" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Talks to doctors on your behalf</text>
<circle cx="72" cy="397" r="5" fill="#39BAA6"/>
<text x="88" y="402" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Reads &amp; replies to your email</text>
<circle cx="411" cy="397" r="5" fill="#39BAA6"/>
<text x="427" y="402" font-family="Liberation Sans, DejaVu Sans, sans-serif" font-size="17" font-weight="normal" fill="#EAF3F2" text-anchor="start">Places outbound calls for you</text>
