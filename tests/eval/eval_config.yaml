metrics_to_run:
  - tool_trajectory_check
  - custom_response_quality

custom_metrics:
  # Default: local LLM-as-judge defined in metrics.py (a real, lintable/testable
  # module) rather than an inline blob. It runs in-process via google-genai, so it
  # grades on BOTH Vertex (ADC) and Google AI Studio (GEMINI_API_KEY) with no
  # managed Vertex eval service -- genai.Client() auto-selects the backend from the
  # project's .env (loaded by `eval grade`). It uses each case's `reference` (ground
  # truth) when present. To use the managed Vertex eval service instead (rubric
  # LLMMetric; needs a GCP project), see the eval skill's metrics-guide.
  - name: custom_response_quality
    custom_function_file: metrics.py
  - name: agent_turn_count
    custom_function: |
      def evaluate(instance):
          turns = (instance.get("agent_data") or {}).get("turns", [])
          return {'score': len(turns)}
  - name: tool_trajectory_check
    custom_function: |
      def evaluate(instance):
          expected_tool = None
          ref = instance.get("reference")
          if ref and "response" in ref:
              parts = ref["response"].get("parts", [])
              if parts and "text" in parts[0]:
                  expected_tool = parts[0]["text"]
          
          if not expected_tool:
              return {"score": 1, "explanation": "No expected tool specified."}

          called_tools = []
          for turn in (instance.get("agent_data") or {}).get("turns", []):
              for event in turn.get("events", []):
                  for part in (event.get("content") or {}).get("parts", []):
                      if "function_call" in part:
                          called_tools.append(part["function_call"].get("name"))
          
          if any(expected_tool in ct for ct in called_tools):
              return {"score": 1, "explanation": f"Pass: Expected tool '{expected_tool}' matched a called tool."}
          else:
              return {"score": 0, "explanation": f"Fail: Expected tool '{expected_tool}' was NOT called. Tools called: {called_tools}"}
